###############################################################
# .github/workflows/deploy.yml
# CI/CD pipeline – Docker Hub registry (AWS Academy compatible)
###############################################################

name: Build & Deploy to AWS

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/studyplanner-backend
  DOCKERHUB_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/studyplanner-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.DOCKERHUB_BACKEND }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.DOCKERHUB_FRONTEND }}:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy production compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:      ${{ secrets.EC2_HOST }}
          username:  ec2-user
          key:       ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source:    "docker-compose.prod.yml"
          target:    "~/studyplanner"
          overwrite: true

      - name: SSH → Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            FRONTEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/studyplanner-frontend"

            echo "==> Restoring Nginx to a working state..."
            sudo dnf install -y nginx
            sudo tee /etc/nginx/nginx.conf << 'EOF'
            user nginx;
            worker_processes auto;
            error_log /var/log/nginx/error.log notice;
            pid /run/nginx.pid;
            events { worker_connections 1024; }
            http {
                include /etc/nginx/mime.types;
                sendfile on;
                include /etc/nginx/conf.d/*.conf;
            }
            EOF

            echo "==> Recreating Site Configuration..."
            sudo rm -f /etc/nginx/conf.d/*.conf
            sudo tee /etc/nginx/conf.d/studyplanner.conf << 'EOF'
            server {
                listen 80;
                server_name _;
                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }
                location /api/ {
                    proxy_pass http://studyplanner-alb-1081838930.us-east-1.elb.amazonaws.com/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Host studyplanner-alb-1081838930.us-east-1.elb.amazonaws.com;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }
            }
            EOF

            sudo /usr/sbin/nginx -t
            sudo systemctl restart nginx

            echo "==> Pulling Frontend image..."
            sudo docker pull "${FRONTEND_IMAGE}:${IMAGE_TAG}"
            sudo docker tag "${FRONTEND_IMAGE}:${IMAGE_TAG}" "${FRONTEND_IMAGE}:latest"

            echo "==> Starting Frontend..."
            sudo docker stop studyplanner-frontend || true
            sudo docker rm studyplanner-frontend || true
            sudo docker run -d \
              --name studyplanner-frontend \
              --restart always \
              -p 3000:80 \
              "${FRONTEND_IMAGE}:latest"

            echo "==> Status:"
            sudo docker ps
