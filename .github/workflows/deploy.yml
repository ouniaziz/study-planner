###############################################################
# .github/workflows/deploy.yml
# CI/CD pipeline – Docker Hub registry (AWS Academy compatible)
###############################################################

name: Build & Deploy to AWS

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/studyplanner-backend
  DOCKERHUB_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/studyplanner-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 – Build images & push to Docker Hub
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Short commit SHA as the image tag
      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend ──────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.DOCKERHUB_BACKEND }}:latest

      # ── Frontend ─────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.DOCKERHUB_FRONTEND }}:latest

  # ─────────────────────────────────────────────────────────────
  # JOB 2 – Deploy on EC2 via SSH
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Docker and Compose if missing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # Install Docker
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo dnf install -y docker || sudo yum install -y docker
              sudo systemctl enable --now docker
              sudo usermod -aG docker ec2-user
            fi

            # Install Docker Compose (Direct download fallback)
            if ! docker compose version &> /dev/null; then
              echo "Installing Docker Compose binary..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              # Create a symbolic link so 'docker compose' works
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo ln -s /usr/local/bin/docker-compose /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # Final check
            docker version && docker compose version

      - name: Copy production compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:      ${{ secrets.EC2_HOST }}
          username:  ec2-user
          key:       ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source:    "docker-compose.prod.yml"
          target:    "~/studyplanner"
          overwrite: true

      - name: Deploy Frontend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            FRONTEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/studyplanner-frontend"

            echo "==> Pulling Frontend image..."
            sudo /usr/bin/docker pull "${FRONTEND_IMAGE}:${IMAGE_TAG}"
            sudo /usr/bin/docker tag "${FRONTEND_IMAGE}:${IMAGE_TAG}" "${FRONTEND_IMAGE}:latest"

            echo "==> Starting Frontend container..."
            cd ~/studyplanner
            
            # Start only the frontend (backend is in ASG)
            # We use docker run directly for simplicity on the frontend host
            sudo /usr/bin/docker stop studyplanner-frontend || true
            sudo /usr/bin/docker rm studyplanner-frontend || true
            sudo /usr/bin/docker run -d \
              --name studyplanner-frontend \
              --restart always \
              -p 3000:80 \
              "${FRONTEND_IMAGE}:latest"

            echo "==> Creating clean Nginx configuration..."
            sudo tee /etc/nginx/nginx.conf << 'EOF'
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    sendfile            on;
    keepalive_timeout   65;
    include /etc/nginx/conf.d/*.conf;
}
EOF
            
            echo "==> Debugging Config Files..."
            cat /etc/nginx/nginx.conf
            cat /etc/nginx/conf.d/studyplanner.conf
            
            sudo /usr/sbin/nginx -t
            
            echo "==> Ensuring Nginx is running..."
            sudo systemctl restart nginx
            sudo systemctl status nginx --no-pager

            echo "==> Final Status:"
            sudo /usr/bin/docker ps
