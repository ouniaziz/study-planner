###############################################################
# docker-compose.prod.yml
# Production compose – pulls images from ECR instead of building
###############################################################

services:
  postgres:
    image: postgres:16-alpine
    container_name: studyplanner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-studyplanner}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # required – set in .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ${DOCKERHUB_BACKEND}:${IMAGE_TAG:-latest}
    container_name: studyplanner-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-studyplanner}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_JWT_SECRET:             ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION:         ${APP_JWT_EXPIRATION:-86400000}
      SPRING_PROFILES_ACTIVE:     prod
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${DOCKERHUB_FRONTEND}:${IMAGE_TAG:-latest}
    container_name: studyplanner-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
