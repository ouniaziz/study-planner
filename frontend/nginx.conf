server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the AWS Load Balancer
    location /api/ {
        proxy_pass http://studyplanner-alb-1081838930.us-east-1.elb.amazonaws.com/api/;
        proxy_set_header Host studyplanner-alb-1081838930.us-east-1.elb.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA routing — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
